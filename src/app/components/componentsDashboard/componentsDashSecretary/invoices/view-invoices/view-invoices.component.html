<div class="container-fluid">
  <div class="page-title-box d-flex align-items-center justify-content-between">
    <h4 class="mb-0"><i class="ri-file-list-3-line"></i> Invoice Management</h4>
    <button class="btn-primary-medical" (click)="router.navigate(['/Invoices/create'])">
      <i class="ri-add-line"></i> Create New Invoice
    </button>
  </div>

  <div class="card">
    <div class="card-header border-0 pt-4 px-4">
      <div class="row align-items-center">
        <div class="col-md-4">
          <div class="search-box">
            <input type="text" class="form-control" placeholder="Search patient or ID..." [(ngModel)]="searchTerm">
            <i class="ri-search-line search-icon"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table align-middle table-nowrap table-hover mb-0">
          <thead>
            <tr>
              <th>Invoice ID</th>
              <th>Patient</th>
              <th>Date</th>
              <th>Total Amount</th>
              <th>Method</th>
              <th>Status</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let inv of filteredInvoices">
              <td class="fw-bold text-primary">{{ inv.number }}</td>
              <td>{{ inv.patient }}</td>
              <td>{{ inv.date | date:'dd MMM yyyy' }}</td>
              <td class="fw-bold">{{ inv.amount | number:'1.3-3' }} TND</td>
              <td><span class="text-muted">{{ inv.method }}</span></td>
              <td>
                <span class="badge" [ngClass]="getStatusClass(inv.status)">
                  {{ inv.status }}
                </span>
              </td>
              <td class="text-end">
                <div class="d-flex justify-content-end gap-2 px-3">
                  <button class="btn-icon text-info" (click)="editInvoice(inv.id)" title="Edit">
                    <i class="ri-pencil-line"></i>
                  </button>
                  <button class="btn-icon text-danger" (click)="deleteInvoice(inv.id)" title="Delete">
                    <i class="ri-delete-bin-line"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
