<div class="settings-wrapper">
  <div class="page-header mb-4">
    <h2 class="fw-bold"><i class="ri-settings-3-line me-2"></i> General Settings</h2>
    <p class="text-muted">Manage your clinic profile and application preferences.</p>
  </div>

  <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
    <div class="row">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-header bg-white py-3">
            <h5 class="mb-0 text-primary">Clinic Profile</h5>
          </div>
          <div class="card-body">
            <div class="row gy-4">
              <div class="col-12 d-flex align-items-center gap-4 mb-3">
                <div class="logo-upload">
                  <img [src]="logoPreview" alt="Clinic Logo" class="rounded-circle border">
                  <label for="logoInput" class="upload-btn"><i class="ri-camera-line"></i></label>
                  <input type="file" id="logoInput" (change)="onLogoChange($event)" hidden>
                </div>
                <div>
                  <h6 class="mb-1">Clinic Logo</h6>
                  <p class="text-muted small mb-0">PNG or JPG, max 2MB.</p>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label">Clinic Name</label>
                <input type="text" class="form-control" formControlName="clinicName">
              </div>
              <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" formControlName="email">
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" formControlName="phone">
              </div>
              <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="2" formControlName="address"></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-header bg-white py-3">
            <h5 class="mb-0 text-primary">Preferences</h5>
          </div>
          <div class="card-body">
            <div class="mb-4">
              <label class="form-label">Display Language</label>
              <select class="form-select" formControlName="language">
                <option value="fr">Français</option>
                <option value="en">English</option>
                <option value="ar">Tunisian Arabic</option>
              </select>
            </div>

            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" formControlName="notifications">
              <label class="form-check-label">Enable Email Notifications</label>
            </div>

            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" formControlName="darkMode">
              <label class="form-check-label">Dark Mode UI</label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-save w-100" [disabled]="isSaving">
          <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!isSaving" class="ri-save-fill me-2"></i> Save All Changes
        </button>
      </div>
    </div>
  </form>
</div>
