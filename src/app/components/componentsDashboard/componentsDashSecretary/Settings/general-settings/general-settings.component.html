<div class="container-fluid">
  <div class="page-title-box">
    <h4 class="mb-0"><i class="ri-settings-4-line"></i> General Settings</h4>
  </div>

  <div class="row">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-soft-primary py-3">
          <h5 class="card-title mb-0"><i class="ri-hospital-line me-2"></i> Cabinet Profile</h5>
        </div>
        <div class="card-body p-4">
          <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
            <div class="row">
              <div class="col-md-12 mb-3">
                <label class="form-label fw-bold text-muted">Cabinet Name</label>
                <input type="text" class="form-control medical-input" formControlName="cabinetName">
              </div>
              
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold text-muted">Contact Email</label>
                <input type="email" class="form-control medical-input" formControlName="email">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold text-muted">Phone Number</label>
                <input type="text" class="form-control medical-input" formControlName="phone">
              </div>

              <div class="col-md-12 mb-3">
                <label class="form-label fw-bold text-muted">Address</label>
                <textarea class="form-control medical-input" rows="2" formControlName="address"></textarea>
              </div>

              <div class="col-md-6 mb-4">
                <label class="form-label fw-bold text-muted">Opening Hours</label>
                <div class="d-flex gap-2">
                  <input type="time" class="form-control medical-input" formControlName="openingTime">
                  <span class="align-self-center">to</span>
                  <input type="time" class="form-control medical-input" formControlName="closingTime">
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end border-top pt-4">
              <button type="submit" class="btn-primary-medical px-5" [disabled]="settingsForm.invalid || isSaving">
  <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2" role="status"></span>
  
  <i *ngIf="!isSaving" class="ri-save-line me-2"></i>
  
  {{ isSaving ? 'Saving...' : 'Save Configuration' }}
</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card border-0 shadow-sm bg-blue text-white mb-4">
        <div class="card-body p-4">
          <div class="d-flex align-items-center mb-3">
            <div class="flex-grow-1">
              <h5 class="text-white mb-1">Cabinet Status</h5>
              <p class="text-white-50 small mb-0">Currently visible to patients</p>
            </div>
            <div class="form-check form-switch fs-24">
              <input class="form-check-input" type="checkbox" checked>
            </div>
          </div>
          <hr class="border-light opacity-25">
          <div class="mt-3">
            <small class="text-white-50">Last Backup</small>
            <p class="mb-0 fw-bold">Today, 02:00 AM</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
