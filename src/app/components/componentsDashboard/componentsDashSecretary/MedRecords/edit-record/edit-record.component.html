<div class="container-fluid" *ngIf="!isLoading; else loadingTemplate">
  <div class="row">
    <div class="col-12">
      <div class="page-title-box d-sm-flex align-items-center justify-content-between">
        <h4 class="mb-sm-0">Edit Medical Record: #{{recordId}}</h4>
        <div class="page-title-right">
          <ol class="breadcrumb m-0">
            <li class="breadcrumb-item"><a href="javascript: void(0);">Records</a></li>
            <li class="breadcrumb-item active">Edit</li>
          </ol>
        </div>
      </div>
    </div>
  </div>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="card">
      <div class="card-header bg-soft-secondary">
        <h4 class="card-title mb-0"><i class="ri-user-settings-line me-1"></i> Patient Info</h4>
      </div>
      <div class="card-body">
        <div class="row gy-3">
          <div class="col-md-3">
            <label class="form-label">CIN</label>
            <input type="text" class="form-control" formControlName="CIN" readonly>
            <small class="text-muted">CIN cannot be changed</small>
          </div>
          <div class="col-md-4">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" formControlName="FirstName">
          </div>
          <div class="col-md-5">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" formControlName="LastName">
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header bg-soft-success">
        <h4 class="card-title mb-0"><i class="ri-pulse-line me-1"></i> Update Vitals</h4>
      </div>
      <div class="card-body">
        <div class="row gy-3">
          <div class="col-md-4">
            <label class="form-label">Blood Pressure</label>
            <input type="text" class="form-control" formControlName="BloodPressure">
          </div>
          <div class="col-md-4">
            <label class="form-label">Blood Group</label>
            <select class="form-select" formControlName="BloodGroup">
              <option value="A+">A+</option>
              <option value="O+">O+</option>
              <option value="B+">B+</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="card p-3 shadow-sm border-0 bg-light">
      <div class="d-flex justify-content-center gap-2">
        <button type="submit" class="btn btn-primary px-4">
          <i class="ri-refresh-line align-bottom me-1"></i> Update Changes
        </button>
        <button type="button" class="btn btn-outline-danger px-4" (click)="router.navigate(['/MedRecords/View-all'])">
          Cancel
        </button>
      </div>
    </div>
  </form>
</div>

<ng-template #loadingTemplate>
  <div class="text-center p-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">Loading Patient History...</p>
  </div>
</ng-template>
