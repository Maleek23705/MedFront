<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="page-title-box d-flex align-items-center justify-content-between">
        <h4 class="mb-0">Edit Medical Record</h4>
        <div class="page-title-right">
          <ol class="breadcrumb m-0">
            <li class="breadcrumb-item"><a href="javascript:void(0);">Patients</a></li>
            <li class="breadcrumb-item active">Edit Record</li>
          </ol>
        </div>
      </div>
    </div>
  </div>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-header bg-soft-primary border-0 py-3">
        <h5 class="card-title mb-0 text-primary"><i class="ri-user-settings-line me-2"></i> Update Personal Info</h5>
      </div>
      <div class="card-body">
        <div class="row gy-3">
          <div class="col-md-3">
            <label class="form-label">CIN (Locked)</label>
            <input type="text" class="form-control bg-light" formControlName="CIN" readonly>
          </div>
          <div class="col-md-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" formControlName="FirstName" [ngClass]="{'is-invalid': submitted && userForm.get('FirstName')?.invalid}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" formControlName="LastName" [ngClass]="{'is-invalid': submitted && userForm.get('LastName')?.invalid}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" formControlName="Phone">
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-lg-6">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-header bg-soft-success border-0 py-3">
            <h5 class="card-title mb-0 text-success"><i class="ri-pulse-line me-2"></i> Current Vitals</h5>
          </div>
          <div class="card-body">
            <div class="row gy-3">
              <div class="col-6"><label class="form-label">BP (mmHg)</label><input type="text" class="form-control" formControlName="BloodPressure"></div>
              <div class="col-6"><label class="form-label">Heart Rate</label><input type="number" class="form-control" formControlName="HeartRate"></div>
              <div class="col-4"><label class="form-label">Weight</label><input type="number" class="form-control" formControlName="Weight"></div>
              <div class="col-4"><label class="form-label">Height</label><input type="number" class="form-control" formControlName="Height"></div>
              <div class="col-4"><label class="form-label">Temp</label><input type="number" class="form-control" formControlName="Temperature"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-header bg-soft-info border-0 py-3">
            <h5 class="card-title mb-0 text-info"><i class="ri-history-line me-2"></i> Medical History</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">Blood Group</label>
              <select class="form-select" formControlName="BloodGroup">
                <option value="" disabled>Select Blood Type</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
              </select>
            </div>
            <label class="form-label">Chronic Diseases</label>
            <textarea class="form-control" rows="2" formControlName="ChronicDiseases" placeholder="Enter chronic conditions..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <div class="card mt-4 border-0 shadow-sm">
      <div class="card-body d-flex justify-content-center gap-3">
        <button type="submit" class="btn btn-primary-medical px-5" [disabled]="isUpdating">
          <span *ngIf="isUpdating" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!isUpdating" class="ri-refresh-line me-2"></i> Update Record
        </button>
        <button type="button" class="btn btn-light px-5" (click)="onCancel()">Cancel</button>
      </div>
    </div>
  </form>
</div>
