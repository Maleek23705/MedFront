<div class="container-fluid">
  <div class="page-title-box d-flex align-items-center justify-content-between">
    <h4 class="mb-0"><i class="ri-list-ordered"></i> Live Waiting List</h4>
    <div class="d-flex gap-2">
      <span class="badge bg-soft-primary text-primary fs-13 p-2">
        Total Waiting: {{ patients.length }}
      </span>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-header border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
      <div class="search-box w-25">
        <input type="text" class="form-control" placeholder="Search patient..." [(ngModel)]="searchTerm">
        <i class="ri-search-line search-icon"></i>
      </div>
      <button class="btn-primary-medical" (click)="ngOnInit()">
        <i class="ri-refresh-line"></i> Refresh List
      </button>
    </div>

    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table align-middle table-hover mb-0">
          <thead>
            <tr>
              <th class="ps-4">Pos.</th>
              <th>Patient Name</th>
              <th>Arrival</th>
              <th>Reason</th>
              <th>Status</th>
              <th class="text-end pe-4">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of filteredPatients" class="patient-row">
              <td class="ps-4"><span class="fw-bold text-primary">#{{ p.position }}</span></td>
              <td class="fw-semibold">{{ p.name }}</td>
              <td>{{ p.arrivalTime }}</td>
              <td><span class="text-muted">{{ p.reason }}</span></td>
              <td>
                <span class="badge" 
                      [ngClass]="p.status === 'In Consultation' ? 'badge-soft-success' : 'badge-soft-warning'">
                  {{ p.status }}
                </span>
              </td>
              <td class="text-end pe-4">
                <div class="d-flex justify-content-end gap-2">
                  <button *ngIf="p.status === 'Waiting'" 
                          class="btn btn-sm btn-soft-success" 
                          (click)="updateStatus(p.id, 'In Consultation')">
                    Call Patient
                  </button>
                  <button class="btn-icon text-danger" (click)="removePatient(p.id)">
                    <i class="ri-delete-bin-line"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
