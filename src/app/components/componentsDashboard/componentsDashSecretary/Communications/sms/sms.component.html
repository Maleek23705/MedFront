<div class="container-fluid">
  <div class="page-title-box">
    <h4 class="mb-0"><i class="ri-message-3-line"></i> SMS Communication</h4>
  </div>

  <div class="row">
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-soft-warning py-3">
          <h5 class="card-title mb-0 text-warning"><i class="ri-flashlight-line me-2"></i> Fast Templates</h5>
        </div>
        <div class="card-body">
          <div *ngFor="let t of templates" 
               (click)="selectTemplate(t)"
               class="template-card mb-3 p-3 rounded border-dashed">
            <h6 class="fw-bold mb-1">{{ t.name }}</h6>
            <p class="text-muted small mb-0">{{ t.body }}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form [formGroup]="smsForm" (ngSubmit)="onSend()">
            <div class="mb-3">
              <label class="form-label fw-bold text-muted">Patient Phone Number</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0">+216</span>
                <input type="text" class="form-control medical-input" placeholder="8-digit number" formControlName="phone">
              </div>
            </div>

            <div class="mb-2">
              <div class="d-flex justify-content-between">
                <label class="form-label fw-bold text-muted">Message Content</label>
                <span class="badge" [ngClass]="charCount > 140 ? 'bg-soft-danger text-danger' : 'bg-soft-primary text-primary'">
                  {{ charCount }} / {{ maxChars }}
                </span>
              </div>
              <textarea class="form-control medical-input" rows="5" placeholder="Write the SMS..." formControlName="message"></textarea>
            </div>

            <div class="d-flex justify-content-end gap-3 pt-3 border-top">
              <button type="button" class="btn btn-soft-light px-4" (click)="smsForm.reset()">Clear</button>
              <button type="submit" class="btn-primary-medical px-5" [disabled]="smsForm.invalid || isSending">
                <i *ngIf="!isSending" class="ri-smartphone-line me-2"></i>
                <span *ngIf="isSending" class="spinner-border spinner-border-sm me-2"></span>
                {{ isSending ? 'Sending...' : 'Send SMS' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
