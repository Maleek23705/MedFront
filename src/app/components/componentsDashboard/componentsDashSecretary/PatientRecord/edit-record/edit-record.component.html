<div class="container-fluid">
  <div class="page-title-box d-flex align-items-center justify-content-between">
    <div class="page-title-left">
      <h4 class="mb-1 text-primary-medical fw-bold text-uppercase">
        <i class="ri-edit-box-line me-1"></i> Edit Patient Record
      </h4>
      <div class="page-title-nav">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb m-0 fs-13">
            <li class="breadcrumb-item text-muted">Secretary</li>
            <li class="breadcrumb-item text-muted">Patients</li>
            <li class="breadcrumb-item active">Edit Profile</li>
          </ol>
        </nav>
      </div>
    </div>

    <div class="page-title-right">
      <button class="btn-booking shadow-primary" routerLink="/dashboard/common/appointments/add-appointment">
        <i class="ri-calendar-check-line"></i> Go to Booking Page
      </button>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-12">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
          <label class="form-label text-dark fw-bold mb-3">Select Patient to Edit</label>
          <div class="position-relative">
            <div class="input-group search-container">
              <span class="input-group-text bg-light border-end-0">
                <i class="ri-search-line text-muted"></i>
              </span>
              <input type="text" class="form-control custom-input border-start-0" 
                     placeholder="Search by Name or CIN..." 
                     [(ngModel)]="searchTerm" (input)="onSearchChange()">
            </div>
            
            <div class="search-dropdown shadow-lg" *ngIf="showDropdown && filteredPatients.length > 0">
              <div class="search-item" *ngFor="let p of filteredPatients" (click)="selectPatient(p)">
                <div class="d-flex justify-content-between align-items-center">
                  <span><strong>{{p.firstName}} {{p.lastName}}</strong></span>
                  <span class="badge bg-soft-info text-info">CIN: {{p.cin}}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <form [formGroup]="editForm" (ngSubmit)="updateRecord()" *ngIf="patientId">
        <div class="card border-0 shadow-sm mb-4">
          <div class="card-header bg-soft-info border-0 py-3">
            <h5 class="card-title mb-0 text-primary-medical">Update Personal Details</h5>
          </div>
          <div class="card-body p-4">
            <div class="row gy-4">
              <div class="col-md-6">
                <label class="form-label text-muted">First Name</label>
                <input type="text" class="form-control custom-input" formControlName="firstName">
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted">Last Name</label>
                <input type="text" class="form-control custom-input" formControlName="lastName">
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted">National ID (CIN)</label>
                <input type="text" class="form-control custom-input" formControlName="cin">
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted">Phone Number</label>
                <input type="text" class="form-control custom-input" formControlName="phone">
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted">Date of Birth</label>
                <input type="date" class="form-control custom-input" formControlName="dob">
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted">Gender</label>
                <select class="form-select custom-input" formControlName="gender">
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <div class="row align-items-center">
              <div class="col-md-6">
                <label class="form-label text-muted">Last Arrival Date</label>
                <input type="date" class="form-control custom-input" formControlName="arrivalDate">
              </div>
              <div class="col-md-6 text-end">
                <button type="submit" class="btn-save-patient w-100" [disabled]="editForm.invalid">
                  <i class="ri-checkbox-circle-line"></i> Update Patient Profile
                </button>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
