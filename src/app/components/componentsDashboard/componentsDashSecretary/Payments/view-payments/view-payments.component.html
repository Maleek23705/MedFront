<div class="container-fluid">
  <div class="page-title-box d-flex align-items-center justify-content-between">
    <h4 class="mb-0"><i class="ri-money-dollar-circle-line"></i> Payment History</h4>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb m-0">
        <li class="breadcrumb-item text-muted">Payments</li>
        <li class="breadcrumb-item active">View All</li>
      </ol>
    </nav>
  </div>

  <div class="card">
    <div class="card-header border-0 pt-4 px-4">
      <div class="row align-items-center">
        <div class="col-md-4">
          <div class="search-box">
            <input type="text" class="form-control" placeholder="Search patient or invoice..." [(ngModel)]="searchTerm">
            <i class="ri-search-line search-icon"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table align-middle table-hover mb-0">
          <thead>
            <tr>
              <th>Payment Date</th>
              <th>Patient</th>
              <th>Invoice Ref</th>
              <th>Amount Paid</th>
              <th>Method</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of filteredPayments">
              <td>{{ p.date | date:'dd MMM yyyy' }}</td>
              <td class="fw-semibold">{{ p.patient }}</td>
              <td>
                <span class="badge bg-soft-primary text-primary">#{{ p.invoiceRef }}</span>
              </td>
              <td class="fw-bold text-success">{{ p.amount | number:'1.3-3' }} TND</td>
              <td>
                <span class="method-tag">
                  <i class="ri-bank-card-line me-1"></i> {{ p.method }}
                </span>
              </td>
              <td class="text-end">
                <div class="d-flex justify-content-end gap-2 px-3">
                  <button class="btn-icon text-primary" (click)="viewReceipt(p.id)" title="Print Receipt">
                    <i class="ri-printer-line"></i>
                  </button>
                  <button class="btn-icon text-muted" title="View Details">
                    <i class="ri-eye-line"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
