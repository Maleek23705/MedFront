<div class="waiting-list-container">
  <div class="patient-item" *ngFor="let patient of patients">
    <div class="patient-info">
      <div class="avatar" [style.background-color]="patient.color">
        {{ getInitials(patient.name) }}
      </div>
      <div class="details">
        <h4 class="name">{{ patient.name }}</h4>
        <p class="reason">{{ patient.reason }}</p>
      </div>
    </div>

    <div class="appointment-meta">
      <span class="time"><i class="ri-time-line"></i> {{ patient.time }}</span>
      <span class="status-badge" [ngClass]="patient.status.toLowerCase()">
        {{ patient.status }}
      </span>
    </div>

    <div class="actions">
      <button class="btn-icon confirm" title="Confirm Arrival">
        <i class="ri-checkbox-circle-line"></i>
      </button>
      <button class="btn-icon edit" title="Edit Appointment">
        <i class="ri-edit-line"></i>
      </button>
      <button class="btn-icon delete" title="Cancel/Remove">
        <i class="ri-delete-bin-line"></i>
      </button>
    </div>
  </div>

  <button class="btn-view-all">View Full Waiting Room</button>
</div>
